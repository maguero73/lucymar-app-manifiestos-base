apiVersion: apps/v1
kind: Deployment
metadata:
  name: vue-frontend
  namespace: app-demo

spec:
  replicas: 1

  selector:
    matchLabels:
      app: vue-frontend

  template:
    metadata:
      labels:
        app: vue-frontend

    spec:
      containers:
        - name: vue-frontend
          image: vue-frontend:v5

          ports:
            - containerPort: 80
