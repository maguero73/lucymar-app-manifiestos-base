apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi
  namespace: app-demo

spec:
  replicas: 1

  selector:
    matchLabels:
      app: fastapi

  template:
    metadata:
      labels:
        app: fastapi

    spec:
      containers:
      - name: fastapi

        image: maguero22/lucymar-api

        imagePullPolicy: Always

        ports:
        - containerPort: 9000
 
        envFrom:
        - configMapRef:
            name: fastapi-config

        env:
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: MYSQL_ROOT_PASSWORD
